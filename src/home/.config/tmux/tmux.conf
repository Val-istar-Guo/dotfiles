set -g mouse on


# 问题 1: 鼠标松开后默认会 copy-selection-and-cancel，退出 copy-mode 就跳回底部
unbind -T copy-mode    MouseDragEnd1Pane
unbind -T copy-mode-vi MouseDragEnd1Pane
bind -T copy-mode    MouseDragEnd1Pane send -X copy-selection
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-selection

# 可选：双击/三击选词选行也保持不退出
bind -T copy-mode-vi DoubleClick1Pane   select-pane \; send -X select-word      \; send -X copy-selection-no-clear
bind -T copy-mode-vi TripleClick1Pane   select-pane \; send -X select-line      \; send -X copy-selection-no-clear

# 问题 2: 选中后再滚轮，默认滚轮绑的是 halfpage-up/down，同时光标在动，
# 而 selection 还是激活的，所以选区会"跟着"被拉伸。
# 让滚轮在 copy-mode 中只滚动视图，不移动光标、不扩展选区。
bind -T copy-mode-vi WheelUpPane   send -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send -X -N 3 scroll-down
bind -T copy-mode    WheelUpPane   send -X -N 3 scroll-up
bind -T copy-mode    WheelDownPane send -X -N 3 scroll-down
